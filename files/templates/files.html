{% extends "base.html" %}

{% block title %}Files — Merlin Dashboard{% endblock %}

{% block content %}
<link rel="stylesheet" href="/static/files/files.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark-dimmed.min.css">

<div id="files-app">
    <!-- View 1: Directory Listing -->
    <div id="dir-view" class="files-view">
        <div class="files-header">
            <h2>Files</h2>
        </div>
        <div id="breadcrumbs" class="breadcrumbs"></div>
        <div id="dir-entries" class="dir-entries"></div>
        <div id="dir-empty" class="empty-state" style="display:none">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            <p>Empty directory</p>
        </div>
        <div id="dir-error" class="error-state" style="display:none">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
            <p id="dir-error-msg"></p>
        </div>
        <div id="dir-loading" class="loading-indicator">Loading...</div>
    </div>

    <!-- View 2: File Viewer -->
    <div id="file-view" class="files-view" style="display:none">
        <div class="files-header">
            <button id="file-back-btn" class="back-btn" title="Back to directory">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <div class="file-meta" id="file-meta"></div>
            <div class="file-actions">
                <button id="wrap-toggle" class="wrap-toggle-btn" title="Toggle line wrap" style="display:none">Wrap</button>
                <a id="download-link" class="download-btn" title="Download file">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </a>
            </div>
        </div>
        <div id="file-content" class="file-content"></div>
        <div id="file-loading" class="loading-indicator" style="display:none">Loading file...</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
<script src="/static/files/files.js"></script>
{% endblock %}
