# Essential NeoVim settings
set -sg escape-time 0
set -g focus-events on
set -g default-terminal "tmux-256color"
set -ag terminal-features ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Enable mouse support (scrolling, pane selection, resizing)
set -g mouse on

# Enable OSC 52 clipboard (tmux sends clipboard content to terminal emulator)
set -g set-clipboard on

# Key bindings
bind-key -n F2 new-window
bind-key -n F3 previous-window
bind-key -n F4 next-window
bind-key -n F5 kill-window

# General
set -g history-limit 50000
set -g renumber-windows on

# Status bar — dark, minimal, Dracula-inspired
set -g status-style "bg=#1e1e2e,fg=#6272a4"
set -g status-left ""
set -g status-right ""

# Tabs — icon only: ● active, ○ inactive
set -g window-status-format " ○ "
set -g window-status-current-format " ● "
set -g window-status-style "fg=#6272a4,bg=#1e1e2e"
set -g window-status-current-style "fg=#bd93f9,bg=#1e1e2e"

# Load user config if it exists
source-file -q ~/.tmux.conf
