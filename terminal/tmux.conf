# Enable mouse support (scrolling, pane selection, resizing)
set -g mouse on

# Enable OSC 52 clipboard (tmux sends clipboard content to terminal emulator)
set -g set-clipboard on

# Key bindings
bind-key -n F2 new-window
bind-key -n F3 previous-window
bind-key -n F4 next-window
bind-key -n F5 kill-window

# Keep window numbers sequential (no gaps after closing)
set -g renumber-windows on

# Status bar — dark, minimal, Dracula-inspired
set -g status-style "bg=#1e1e2e,fg=#6272a4"
set -g status-left ""
set -g status-right ""

# Tabs — icon only: ● active, ○ inactive
set -g window-status-format " ○ "
set -g window-status-current-format " ● "
set -g window-status-style "fg=#6272a4,bg=#1e1e2e"
set -g window-status-current-style "fg=#bd93f9,bg=#1e1e2e"
